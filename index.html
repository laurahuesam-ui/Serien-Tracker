<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#5b5f97" />
  <title>Serien Tracker</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<header class="app-header">
  <div>
    <p class="eyebrow">Private PWA · lokale Daten</p>
    <h1>Serien Tracker <small>v5</small></h1>
  </div>
  <div class="header-actions">
    <button id="exportBtn" class="secondary" type="button">Backup exportieren</button>
    <button id="importBtn" class="secondary" type="button">Backup importieren</button>
    <input id="importFile" class="hidden" type="file" accept="application/json,.json" />
    <button id="addSeriesBtn" type="button">+ Serie</button>
  </div>
</header>
<main>
  <section class="dashboard" id="dashboard"></section>
  <section class="toolbar">
    <input id="searchInput" type="search" placeholder="Serie suchen ..." />
    <select id="listFilter"><option value="">Alle Listen</option><option value="watch">To watch</option><option value="watched">Geschaut</option></select>
    <select id="statusFilter"><option value="">Alle Status</option><option value="not_started">Nicht begonnen</option><option value="watching">Schaue gerade</option><option value="up_to_date">Alles Verfügbare geschaut</option><option value="completed_final">Serie beendet + komplett geschaut</option><option value="completed">Komplett geschaut (alt)</option><option value="paused">Pausiert</option><option value="dropped">Abgebrochen</option></select>
    <select id="sortSelect"><option value="title">A–Z</option><option value="progress">Fortschritt wenig zuerst</option><option value="recent">Zuletzt geändert</option></select>
  </section>
  <section class="tabs">
    <button class="tab active" data-list="watch" type="button">To watch</button>
    <button class="tab" data-list="watched" type="button">Geschaut</button>
    <button class="tab" data-list="all" type="button">Alle</button>
  </section>
  <section id="seriesGrid" class="grid"></section>
</main>

<dialog id="seriesDialog">
  <form id="seriesForm">
    <h2 id="seriesDialogTitle">Serie bearbeiten</h2>
    <input type="hidden" id="seriesId" />
    <div class="formgrid">
      <label>Titel<input id="titleInput" required /></label>
      <label>Liste<select id="listInput"><option value="watch">To watch</option><option value="watched">Geschaut</option></select></label>
      <label>Status<select id="statusInput"><option value="not_started">Nicht begonnen</option><option value="watching">Schaue gerade</option><option value="up_to_date">Alles Verfügbare geschaut</option><option value="completed_final">Serie beendet + komplett geschaut</option><option value="completed">Komplett geschaut (alt)</option><option value="paused">Pausiert</option><option value="dropped">Abgebrochen</option></select></label>
      <label>IMDb-Link / Suche<input id="imdbInput" placeholder="https://www.imdb.com/..." /></label>
      <label>Staffel-Folgen<input id="seasonCountsInput" placeholder="z.B. 8,8,10" /></label>
      <label>Aktuelle Staffel<input id="currentSeasonInput" type="number" min="0" placeholder="z.B. 2" /></label>
      <label>Aktuelle Folge<input id="currentEpisodeInput" type="number" min="0" placeholder="z.B. 5" /></label>
      <label>Datum zuletzt geschaut<input id="lastDateInput" type="date" /></label>
      <label>Datum-Status<select id="dateModeInput"><option value="date">Datum</option><option value="today">Heute</option><option value="na">n/a</option><option value="none">leer</option></select></label>
      <label>Notiz<input id="notesInput" /></label>
    </div>
    <p class="meta">Staffel-Folgen als Komma-Liste: <b>10,10,8</b>. Du musst nicht jede Folge anlegen – es wird nur gespeichert, bis zu welcher Staffel/Folge du bist.</p>
    <menu>
      <button id="deleteSeriesBtn" class="danger" type="button">Löschen</button>
      <button id="cancelSeriesBtn" class="secondary" type="button">Abbrechen</button>
      <button type="submit">Speichern</button>
    </menu>
  </form>
</dialog>

<dialog id="detailDialog"><div id="detailContent"></div></dialog>
<script src="app.js"></script>
<script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('./service-worker.js');</script>
</body>
</html>
