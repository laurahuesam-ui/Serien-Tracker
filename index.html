<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#5b5f97" />
  <title>Serien Tracker</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<header class="app-header">
  <div>
    <p class="eyebrow">Private PWA · lokale Daten</p>
    <h1>Serien Tracker <small>v1</small></h1>
  </div>
  <div class="header-actions">
    <button id="exportBtn" class="secondary" type="button">Backup exportieren</button>
    <button id="importBtn" class="secondary" type="button">Backup importieren</button>
    <input id="importFile" class="hidden" type="file" accept="application/json,.json" />
    <button id="addSeriesBtn" type="button">+ Serie</button>
  </div>
</header>
<main>
  <section class="dashboard" id="dashboard"></section>
  <section class="toolbar">
    <input id="searchInput" type="search" placeholder="Serie suchen ..." />
    <select id="listFilter">
      <option value="">Alle Listen</option>
      <option value="watch">To watch</option>
      <option value="watched">Geschaut</option>
    </select>
    <select id="statusFilter">
      <option value="">Alle Status</option>
      <option value="not_started">Nicht begonnen</option>
      <option value="watching">Schaue gerade</option>
      <option value="completed">Komplett geschaut</option>
      <option value="paused">Pausiert</option>
      <option value="dropped">Abgebrochen</option>
    </select>
    <select id="sortSelect">
      <option value="title">A–Z</option>
      <option value="progress">Fortschritt wenig zuerst</option>
      <option value="recent">Zuletzt geändert</option>
    </select>
  </section>
  <section class="tabs">
    <button class="tab active" data-list="watch" type="button">To watch</button>
    <button class="tab" data-list="watched" type="button">Geschaut</button>
    <button class="tab" data-list="all" type="button">Alle</button>
  </section>
  <section id="seriesGrid" class="grid"></section>
</main>

<dialog id="seriesDialog">
  <form id="seriesForm">
    <h2 id="seriesDialogTitle">Serie bearbeiten</h2>
    <input type="hidden" id="seriesId" />
    <div class="formgrid">
      <label>Titel<input id="titleInput" required /></label>
      <label>Liste<select id="listInput"><option value="watch">To watch</option><option value="watched">Geschaut</option></select></label>
      <label>Status<select id="statusInput"><option value="not_started">Nicht begonnen</option><option value="watching">Schaue gerade</option><option value="completed">Komplett geschaut</option><option value="paused">Pausiert</option><option value="dropped">Abgebrochen</option></select></label>
      <label>IMDb-Link / Suche<input id="imdbInput" placeholder="https://www.imdb.com/..." /></label>
      <label>Staffel-Folgen<input id="seasonCountsInput" placeholder="z.B. 8,8,10" /></label>
      <label>Notiz<input id="notesInput" /></label>
    </div>
    <p class="meta">Staffel-Folgen als Komma-Liste: <b>10,10,8</b> = 3 Staffeln mit 10/10/8 Folgen.</p>
    <menu>
      <button id="deleteSeriesBtn" class="danger" type="button">Löschen</button>
      <button id="cancelSeriesBtn" class="secondary" type="button">Abbrechen</button>
      <button type="submit">Speichern</button>
    </menu>
  </form>
</dialog>

<dialog id="detailDialog">
  <div id="detailContent"></div>
</dialog>

<dialog id="episodeDialog">
  <form id="episodeForm">
    <h2 id="episodeTitle">Folge</h2>
    <input type="hidden" id="episodeSeriesId" />
    <input type="hidden" id="episodeSeason" />
    <input type="hidden" id="episodeNumber" />
    <div class="formgrid">
      <label>Status<select id="episodeStatus"><option value="open">offen</option><option value="watched">geschaut</option><option value="na">n/a</option></select></label>
      <label>Datum<input id="episodeDate" type="date" /></label>
    </div>
    <div class="quick-row">
      <button id="todayBtn" type="button" class="secondary">Heute</button>
      <button id="naDateBtn" type="button" class="secondary">Datum n/a</button>
      <button id="clearDateBtn" type="button" class="secondary">Datum löschen</button>
    </div>
    <menu>
      <button id="cancelEpisodeBtn" class="secondary" type="button">Abbrechen</button>
      <button type="submit">Speichern</button>
    </menu>
  </form>
</dialog>

<script src="app.js"></script>
<script>
if ('serviceWorker' in navigator) navigator.serviceWorker.register('./service-worker.js');
</script>
</body>
</html>
